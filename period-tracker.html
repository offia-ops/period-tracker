<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>週期小幫手</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 自訂一些簡單的動畫與安全區距 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- 工具函數 (Date Helpers) ---
    const parseDateStr = (dateStr) => {
      if (!dateStr) return new Date();
      const [y, m, d] = dateStr.split('-');
      return new Date(y, m - 1, d);
    };

    const formatDateObj = (dateObj) => {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const addDays = (dateObj, days) => {
      const result = new Date(dateObj);
      result.setDate(result.getDate() + days);
      return result;
    };

    const isDateBetween = (targetStr, startStr, endStr) => {
      return targetStr >= startStr && targetStr <= endStr;
    };

    // --- 主元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [currentMonth, setCurrentMonth] = useState(() => {
        const today = new Date();
        return new Date(today.getFullYear(), today.getMonth(), 1);
      });
      
      const [syncStatus, setSyncStatus] = useState('synced');
      const [settings, setSettings] = useState({ cycleLength: 28, periodLength: 5 });
      const [records, setRecords] = useState([]);
      const [newRecord, setNewRecord] = useState({ startDate: '', endDate: '' });
      const [showAddForm, setShowAddForm] = useState(false);
      const [editingRecordId, setEditingRecordId] = useState(null);
      const [editRecordData, setEditRecordData] = useState({ startDate: '', endDate: '' });

      // 初次載入
      useEffect(() => {
        const savedSettings = localStorage.getItem('menstrual_settings');
        if (savedSettings) setSettings(JSON.parse(savedSettings));
        
        const savedRecords = localStorage.getItem('menstrual_records');
        if (savedRecords) {
          setRecords(JSON.parse(savedRecords));
        } else {
          const today = new Date();
          setRecords([{
            id: '1',
            startDate: formatDateObj(addDays(today, -15)),
            endDate: formatDateObj(addDays(today, -11))
          }]);
        }
      }, []);

      const saveData = (key, data) => {
        setSyncStatus('syncing');
        localStorage.setItem(key, JSON.stringify(data));
        setTimeout(() => setSyncStatus('synced'), 600);
      };

      const latestRecord = useMemo(() => {
        if (records.length === 0) return null;
        return [...records].sort((a, b) => (a.startDate < b.startDate ? 1 : -1))[0];
      }, [records]);

      const predictions = useMemo(() => {
        if (!latestRecord) return [];
        const preds = [];
        let currentCycleStart = parseDateStr(latestRecord.startDate);

        for (let i = 0; i <= 5; i++) {
          const nextCycleStart = addDays(currentCycleStart, settings.cycleLength);
          const currentCycleEnd = addDays(currentCycleStart, settings.periodLength - 1);
          const ovulation = addDays(nextCycleStart, -14);
          const fertileStart = addDays(ovulation, -5);
          const fertileEnd = addDays(ovulation, 1);

          preds.push({
            isPrediction: i > 0, 
            start: formatDateObj(currentCycleStart),
            end: formatDateObj(currentCycleEnd),
            ovulation: formatDateObj(ovulation),
            fertileStart: formatDateObj(fertileStart),
            fertileEnd: formatDateObj(fertileEnd)
          });
          currentCycleStart = nextCycleStart;
        }
        return preds;
      }, [latestRecord, settings]);

      const calendarDays = useMemo(() => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(null);
        
        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = formatDateObj(new Date(year, month, i));
          let type = 'safe'; 
          
          const isActualPeriod = records.some(r => isDateBetween(dateStr, r.startDate, r.endDate));
          let isPredictedPeriod = false;
          let isOvulation = false;
          let isFertile = false;

          for (const p of predictions) {
            if (p.isPrediction && isDateBetween(dateStr, p.start, p.end)) isPredictedPeriod = true;
            if (dateStr === p.ovulation) isOvulation = true;
            if (isDateBetween(dateStr, p.fertileStart, p.fertileEnd) && dateStr !== p.ovulation) isFertile = true;
          }

          if (isActualPeriod) type = 'actual_period';
          else if (isPredictedPeriod) type = 'predicted_period';
          else if (isOvulation) type = 'ovulation';
          else if (isFertile) type = 'fertile';

          days.push({ day: i, dateStr, type });
        }
        return days;
      }, [currentMonth, records, predictions]);

      const handleAddRecord = (e) => {
        e.preventDefault();
        if (!newRecord.startDate || !newRecord.endDate) return;
        const newId = Date.now().toString();
        const updatedRecords = [...records, { ...newRecord, id: newId }];
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
        setNewRecord({ startDate: '', endDate: '' });
        setShowAddForm(false);
      };

      const handleDeleteRecord = (id) => {
        const updatedRecords = records.filter(r => r.id !== id);
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
      };

      const handleSaveEdit = (id) => {
        if (!editRecordData.startDate || !editRecordData.endDate) return;
        const updatedRecords = records.map(r => 
          r.id === id ? { ...r, startDate: editRecordData.startDate, endDate: editRecordData.endDate } : r
        );
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
        setEditingRecordId(null);
      };

      // --- 點擊回到今天的功能 ---
      const handleBackToToday = () => {
        const today = new Date();
        setCurrentMonth(new Date(today.getFullYear(), today.getMonth(), 1));
      };

      // --- AI 助理邏輯 ---
      const [chatHistory, setChatHistory] = useState([
        { role: 'model', parts: [{ text: '嗨！我是您的專屬 AI 健康小助手 🌸 關於月經週期、經期不適或是日常保養，有什麼我可以幫忙解答的嗎？' }] }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [isChatting, setIsChatting] = useState(false);
      const [insight, setInsight] = useState('');
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const chatEndRef = useRef(null);

      const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      useEffect(() => { if (activeTab === 'ai') scrollToBottom(); }, [chatHistory, activeTab]);

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isChatting) return;

        const userMessage = chatInput.trim();
        setChatInput('');
        const newHistory = [...chatHistory, { role: 'user', parts: [{ text: userMessage }] }];
        setChatHistory(newHistory);
        setIsChatting(true);

        try {
          // 🛑 請在此處填入您的 Gemini API Key
          const apiKey = "AQ.Ab8RN6JyJT9zuS9gacjkF9BzKozvQMZSN5-85J6JwI0oZrFQ2A"; 
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

          const payload = {
            contents: newHistory,
            systemInstruction: {
              parts: [{ text: "你是一位專業、溫暖且充滿同理心的女性健康與月經週期諮詢助理。請用繁體中文回答，語氣要像是個貼心的閨蜜或專業的護理師，提供客觀、科學但易懂的健康建議。回答盡量簡潔有力，並使用一點Emoji。請注意，你不能取代專業醫師的診斷，若有醫療需求需提醒就醫。" }]
            }
          };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.candidates && result.candidates.length > 0) {
            setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: result.candidates[0].content.parts[0].text }] }]);
          } else {
            setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: "系統有點忙碌，請稍後再試喔！" }] }]);
          }
        } catch (error) {
          setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: "網路連線似乎有點問題，請檢查連線後再試一次。" }] }]);
        } finally {
          setIsChatting(false);
        }
      };

      const handleGenerateInsight = async () => {
        setIsAnalyzing(true);
        setInsight('');
        try {
          // 🛑 請在此處填入您的 Gemini API Key
          const apiKey = "AQ.Ab8RN6JyJT9zuS9gacjkF9BzKozvQMZSN5-85J6JwI0oZrFQ2A";
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

          const recordsText = records.length > 0
            ? records.map(r => `${r.startDate} 到 ${r.endDate}`).join('; ')
            : "目前無歷史紀錄";

          const prompt = `根據以下使用者的月經週期資料，給予大約100字到150字的簡短關懷與健康建議。
          - 設定週期長度: ${settings.cycleLength} 天
          - 設定行經期: ${settings.periodLength} 天
          - 歷史紀錄: ${recordsText}`;

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            systemInstruction: {
              parts: [{ text: "你是一位專業、溫柔的女性健康顧問。請根據提供的週期數據，提供客觀、科學的簡短評估與週期保養建議。語氣溫暖，並鼓勵使用者。" }]
            }
          };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.candidates && result.candidates.length > 0) {
            setInsight(result.candidates[0].content.parts[0].text);
          } else {
            setInsight("無法產生分析，請稍後再試。");
          }
        } catch (error) {
           setInsight("無法連線至 AI 服務，請確認網路狀態。");
        } finally {
          setIsAnalyzing(false);
        }
      };

      // --- 畫面渲染 ---
      const renderCalendar = () => (
        <div className="bg-white rounded-2xl shadow-sm p-4 animate-fade-in mb-20">
          
          {/* 日曆頂部切換區 */}
          <div className="flex justify-between items-center mb-6 relative">
            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition w-10 h-10 flex items-center justify-center">&lt;</button>
            <div className="text-center flex flex-col items-center">
              <h2 className="text-xl font-bold text-gray-800">{currentMonth.getFullYear()} 年 {currentMonth.getMonth() + 1} 月</h2>
              {/* 新增的「回到今天」按鈕 */}
              <button 
                onClick={handleBackToToday} 
                className="text-[11px] font-medium text-rose-400 hover:text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1 rounded-full mt-1.5 transition-colors"
              >
                回到今天
              </button>
            </div>
            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition w-10 h-10 flex items-center justify-center">&gt;</button>
          </div>

          <div className="grid grid-cols-7 gap-1 mb-2">
            {['日', '一', '二', '三', '四', '五', '六'].map(day => <div key={day} className="text-center text-xs font-medium text-gray-400 py-1">{day}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {calendarDays.map((cell, idx) => (
              <div key={idx} className="aspect-square flex items-center justify-center p-1">
                {cell && (
                  <div className={`w-full h-full flex items-center justify-center rounded-full text-sm font-medium transition-all cursor-default
                      ${cell.type === 'actual_period' ? 'bg-rose-500 text-white shadow-md shadow-rose-200' : ''}
                      ${cell.type === 'predicted_period' ? 'bg-rose-200 text-rose-700' : ''}
                      ${cell.type === 'ovulation' ? 'bg-purple-500 text-white shadow-md shadow-purple-200' : ''}
                      ${cell.type === 'fertile' ? 'bg-purple-100 text-purple-700' : ''}
                      ${cell.type === 'safe' ? 'text-gray-600 hover:bg-gray-50' : ''}
                    `}>
                    {cell.day}
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* 週期狀態圖例說明 */}
          <div className="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 text-xs border-t pt-4">
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-rose-500"></div>
              <span className="text-gray-600">實際月經</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-rose-200"></div>
              <span className="text-gray-600">預測月經</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-purple-500"></div>
              <span className="text-gray-600">排卵日</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-purple-100"></div>
              <span className="text-gray-600">易孕期</span>
            </div>
            <div className="flex items-center gap-2">
              <div className="w-3 h-3 rounded-full bg-transparent border border-gray-200"></div>
              <span className="text-gray-600">安全期</span>
            </div>
          </div>
        </div>
      );

      const renderHistory = () => (
        <div className="bg-white rounded-2xl shadow-sm p-4 animate-fade-in mb-20">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-gray-800">歷年紀錄</h2>
            <button onClick={() => setShowAddForm(!showAddForm)} className="text-sm bg-rose-50 text-rose-600 px-3 py-1.5 rounded-full hover:bg-rose-100 transition">
              {showAddForm ? '取消' : '➕ 新增紀錄'}
            </button>
          </div>
          {showAddForm && (
            <form onSubmit={handleAddRecord} className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div><label className="block text-xs text-gray-500 mb-1">開始日期</label><input type="date" required value={newRecord.startDate} onChange={e => setNewRecord({...newRecord, startDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
                <div><label className="block text-xs text-gray-500 mb-1">結束日期</label><input type="date" required value={newRecord.endDate} onChange={e => setNewRecord({...newRecord, endDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
              </div>
              <button type="submit" className="w-full bg-rose-500 text-white rounded-lg py-2 text-sm font-medium hover:bg-rose-600 transition">儲存紀錄</button>
            </form>
          )}
          <div className="space-y-3">
            {records.length === 0 ? (
              <div className="text-center text-gray-400 py-8 text-sm">目前還沒有紀錄，點擊上方按鈕新增。</div>
            ) : (
              [...records].sort((a, b) => (a.startDate < b.startDate ? 1 : -1)).map(record => {
                if (editingRecordId === record.id) {
                  return (
                    <div key={record.id} className="p-4 border border-rose-200 rounded-xl bg-rose-50 shadow-sm">
                      <div className="grid grid-cols-2 gap-4 mb-3">
                        <div><input type="date" value={editRecordData.startDate} onChange={e => setEditRecordData({...editRecordData, startDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
                        <div><input type="date" value={editRecordData.endDate} onChange={e => setEditRecordData({...editRecordData, endDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
                      </div>
                      <div className="flex justify-end gap-2 mt-2">
                        <button onClick={() => setEditingRecordId(null)} className="px-4 py-1.5 text-sm text-gray-500 hover:bg-gray-200 rounded-lg">取消</button>
                        <button onClick={() => handleSaveEdit(record.id)} className="px-4 py-1.5 text-sm text-white bg-rose-500 hover:bg-rose-600 rounded-lg">儲存</button>
                      </div>
                    </div>
                  );
                }
                return (
                  <div key={record.id} className="flex justify-between items-center p-3 border border-gray-100 rounded-xl bg-white">
                    <div className="flex items-center gap-3">
                      <div className="bg-rose-100 p-2 rounded-full text-rose-500">🩸</div>
                      <div>
                        <div className="text-sm font-bold text-gray-700">{record.startDate} ~ {record.endDate}</div>
                      </div>
                    </div>
                    <div className="flex items-center gap-1">
                      <button onClick={() => {setEditingRecordId(record.id); setEditRecordData({startDate: record.startDate, endDate: record.endDate}); setShowAddForm(false);}} className="text-gray-400 hover:text-blue-500 text-sm px-2">修改</button>
                      <button onClick={() => handleDeleteRecord(record.id)} className="text-gray-400 hover:text-red-500 text-sm px-2">刪除</button>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );

      const renderSettings = () => (
        <div className="bg-white rounded-2xl shadow-sm p-4 animate-fade-in mb-20">
          <h2 className="text-xl font-bold text-gray-800 mb-6">個人化設定</h2>
          <div className="space-y-6">
            <div>
              <div className="flex justify-between mb-2">
                <label className="text-sm font-medium text-gray-700">⏳ 平均月經週期</label>
                <span className="text-sm font-bold text-rose-500">{settings.cycleLength} 天</span>
              </div>
              <input type="range" name="cycleLength" min="21" max="45" value={settings.cycleLength} onChange={e => { const v = { ...settings, cycleLength: parseInt(e.target.value) }; setSettings(v); saveData('menstrual_settings', v); }} className="w-full accent-rose-500" />
            </div>
            <div className="pt-4 border-t border-gray-100">
              <div className="flex justify-between mb-2">
                <label className="text-sm font-medium text-gray-700">🩸 平均行經期長度</label>
                <span className="text-sm font-bold text-rose-500">{settings.periodLength} 天</span>
              </div>
              <input type="range" name="periodLength" min="3" max="10" value={settings.periodLength} onChange={e => { const v = { ...settings, periodLength: parseInt(e.target.value) }; setSettings(v); saveData('menstrual_settings', v); }} className="w-full accent-rose-500" />
            </div>
          </div>
          <div className="mt-8 bg-blue-50 rounded-xl p-4 flex gap-3 items-start">
             <span className="text-blue-500 mt-0.5">🛡️</span>
             <div className="text-xs text-blue-700 leading-relaxed"><strong>免責聲明：</strong> 本預測工具基於日曆算法推算，結果僅供參考。若有避孕需求，請勿僅依賴安全期推算。</div>
          </div>
        </div>
      );

      const renderAiAdvisor = () => (
        <div className="flex flex-col h-full mb-20 animate-fade-in">
          <div className="bg-gradient-to-br from-rose-50 to-orange-50 rounded-2xl shadow-sm p-4 mb-4 border border-rose-100">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-base font-bold text-gray-800">✨ 週期健康洞察</h2>
              <button onClick={handleGenerateInsight} disabled={isAnalyzing} className="text-xs bg-rose-500 text-white px-3 py-1.5 rounded-full hover:bg-rose-600 disabled:opacity-50">
                {isAnalyzing ? '⌛ 分析中...' : '一鍵分析'}
              </button>
            </div>
            {insight ? <div className="text-sm text-gray-700 leading-relaxed bg-white/60 p-3 rounded-xl whitespace-pre-wrap">{insight}</div> : <div className="text-xs text-gray-500 bg-white/50 p-3 rounded-xl">點擊上方按鈕，AI 會為您產出專屬的健康建議。</div>}
          </div>
          <div className="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col overflow-hidden h-[400px]">
            <div className="bg-gray-50 p-3 border-b border-gray-100 text-sm font-bold text-gray-700">💖 護理師諮詢室</div>
            <div className="flex-1 overflow-y-auto p-4 bg-gray-50/50">
              {chatHistory.map((msg, idx) => (
                <div key={idx} className={`mb-4 flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`p-3 rounded-2xl max-w-[85%] text-sm whitespace-pre-wrap ${msg.role === 'user' ? 'bg-rose-500 text-white rounded-br-none' : 'bg-white border border-gray-100 text-gray-700 rounded-bl-none'}`}>
                    {msg.parts[0].text}
                  </div>
                </div>
              ))}
              {isChatting && <div className="mb-4 flex justify-start"><div className="bg-white border border-gray-100 p-3 rounded-2xl rounded-bl-none text-xs text-gray-400">⌛ 正在輸入...</div></div>}
              <div ref={chatEndRef} />
            </div>
            <form onSubmit={handleSendMessage} className="p-3 bg-white border-t border-gray-100 flex gap-2">
              <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="詢問任何健康問題..." className="flex-1 text-sm bg-gray-50 border border-gray-200 rounded-full px-4 py-2 outline-none focus:border-rose-300" disabled={isChatting} />
              <button type="submit" disabled={isChatting || !chatInput.trim()} className="bg-rose-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-rose-600 disabled:opacity-50">📤</button>
            </form>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen">
          <header className="bg-white px-4 py-4 shadow-sm sticky top-0 z-10">
            <div className="max-w-md mx-auto flex items-center justify-between">
              <h1 className="text-lg font-bold text-gray-800">💖 週期小幫手</h1>
              <div className="text-xs font-medium">
                {syncStatus === 'syncing' ? <span className="text-gray-400">☁️ 儲存中...</span> : <span className="text-emerald-500">✅ 已儲存</span>}
              </div>
            </div>
          </header>
          <main className="max-w-md mx-auto p-4 pt-6">
            {activeTab === 'calendar' && renderCalendar()}
            {activeTab === 'history' && renderHistory()}
            {activeTab === 'settings' && renderSettings()}
            {activeTab === 'ai' && renderAiAdvisor()}
          </main>
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <div className="max-w-md mx-auto flex justify-around">
              <button onClick={() => setActiveTab('calendar')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'calendar' ? 'text-rose-500' : 'text-gray-400'}`}><span className="text-xl">📅</span><span className="text-[10px]">預測日曆</span></button>
              <button onClick={() => setActiveTab('history')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'history' ? 'text-rose-500' : 'text-gray-400'}`}><span className="text-xl">⏳</span><span className="text-[10px]">歷年紀錄</span></button>
              <button onClick={() => setActiveTab('ai')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'ai' ? 'text-rose-500' : 'text-gray-400'}`}><span className="text-xl">✨</span><span className="text-[10px]">AI 顧問</span></button>
              <button onClick={() => setActiveTab('settings')} className={`flex-1 py-3 flex flex-col items-center gap-1 ${activeTab === 'settings' ? 'text-rose-500' : 'text-gray-400'}`}><span className="text-xl">⚙️</span><span className="text-[10px]">設定</span></button>
            </div>
          </nav>
        </div>
      );
    }

    // 將 App 元件渲染到 HTML 中的 <div id="root"></div> 裡面
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

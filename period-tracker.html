<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生理週期紀錄</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- 工具函數 (Date Helpers) ---
    const parseDateStr = (dateStr) => {
      if (!dateStr) return new Date();
      const [y, m, d] = dateStr.split('-');
      return new Date(y, m - 1, d);
    };

    const formatDateObj = (dateObj) => {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, '0');
      const d = String(dateObj.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };

    const addDays = (dateObj, days) => {
      const result = new Date(dateObj);
      result.setDate(result.getDate() + days);
      return result;
    };

    const isDateBetween = (targetStr, startStr, endStr) => {
      return targetStr >= startStr && targetStr <= endStr;
    };

    // --- 主元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [currentMonth, setCurrentMonth] = useState(() => {
        const today = new Date();
        return new Date(today.getFullYear(), today.getMonth(), 1);
      });
      
      const [syncStatus, setSyncStatus] = useState('synced');
      const [settings, setSettings] = useState({ cycleLength: 28, periodLength: 5 });
      const [records, setRecords] = useState([]);
      const [newRecord, setNewRecord] = useState({ startDate: '', endDate: '' });
      const [showAddForm, setShowAddForm] = useState(false);
      const [editingRecordId, setEditingRecordId] = useState(null);
      const [editRecordData, setEditRecordData] = useState({ startDate: '', endDate: '' });

      // 備份與還原的狀態
      const [backupCode, setBackupCode] = useState('');
      const [importCode, setImportCode] = useState('');

      // 初次載入
      useEffect(() => {
        const savedSettings = localStorage.getItem('menstrual_settings');
        if (savedSettings) setSettings(JSON.parse(savedSettings));
        
        const savedRecords = localStorage.getItem('menstrual_records');
        if (savedRecords) {
          setRecords(JSON.parse(savedRecords));
        } else {
          const today = new Date();
          setRecords([{
            id: '1',
            startDate: formatDateObj(addDays(today, -15)),
            endDate: formatDateObj(addDays(today, -11))
          }]);
        }
      }, []);

      const saveData = (key, data) => {
        setSyncStatus('syncing');
        localStorage.setItem(key, JSON.stringify(data));
        setTimeout(() => setSyncStatus('synced'), 600);
      };

      const latestRecord = useMemo(() => {
        if (records.length === 0) return null;
        return [...records].sort((a, b) => (a.startDate < b.startDate ? 1 : -1))[0];
      }, [records]);

      const predictions = useMemo(() => {
        if (!latestRecord) return [];
        const preds = [];
        let currentCycleStart = parseDateStr(latestRecord.startDate);

        for (let i = 0; i <= 5; i++) {
          const nextCycleStart = addDays(currentCycleStart, settings.cycleLength);
          const currentCycleEnd = addDays(currentCycleStart, settings.periodLength - 1);
          const ovulation = addDays(nextCycleStart, -14);
          const fertileStart = addDays(ovulation, -5);
          const fertileEnd = addDays(ovulation, 1);

          preds.push({
            isPrediction: i > 0, 
            start: formatDateObj(currentCycleStart),
            end: formatDateObj(currentCycleEnd),
            ovulation: formatDateObj(ovulation),
            fertileStart: formatDateObj(fertileStart),
            fertileEnd: formatDateObj(fertileEnd)
          });
          currentCycleStart = nextCycleStart;
        }
        return preds;
      }, [latestRecord, settings]);

      const calendarDays = useMemo(() => {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        const days = [];
        for (let i = 0; i < firstDay; i++) days.push(null);
        
        for (let i = 1; i <= daysInMonth; i++) {
          const dateStr = formatDateObj(new Date(year, month, i));
          let type = 'safe'; 
          
          const isActualPeriod = records.some(r => isDateBetween(dateStr, r.startDate, r.endDate));
          let isPredictedPeriod = false;
          let isOvulation = false;
          let isFertile = false;

          for (const p of predictions) {
            if (p.isPrediction && isDateBetween(dateStr, p.start, p.end)) isPredictedPeriod = true;
            if (dateStr === p.ovulation) isOvulation = true;
            if (isDateBetween(dateStr, p.fertileStart, p.fertileEnd) && dateStr !== p.ovulation) isFertile = true;
          }

          if (isActualPeriod) type = 'actual_period';
          else if (isPredictedPeriod) type = 'predicted_period';
          else if (isOvulation) type = 'ovulation';
          else if (isFertile) type = 'fertile';

          days.push({ day: i, dateStr, type });
        }
        return days;
      }, [currentMonth, records, predictions]);

      const handleAddRecord = (e) => {
        e.preventDefault();
        if (!newRecord.startDate || !newRecord.endDate) return;
        const newId = Date.now().toString();
        const updatedRecords = [...records, { ...newRecord, id: newId }];
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
        setNewRecord({ startDate: '', endDate: '' });
        setShowAddForm(false);
      };

      const handleDeleteRecord = (id) => {
        const updatedRecords = records.filter(r => r.id !== id);
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
      };

      const handleSaveEdit = (id) => {
        if (!editRecordData.startDate || !editRecordData.endDate) return;
        const updatedRecords = records.map(r => 
          r.id === id ? { ...r, startDate: editRecordData.startDate, endDate: editRecordData.endDate } : r
        );
        setRecords(updatedRecords);
        saveData('menstrual_records', updatedRecords);
        setEditingRecordId(null);
      };

      const handleBackToToday = () => {
        const today = new Date();
        setCurrentMonth(new Date(today.getFullYear(), today.getMonth(), 1));
      };

      // --- 跨裝置匯出/匯入邏輯 ---
      const handleExportData = () => {
        const exportData = {
          settings: settings,
          records: records
        };
        const encodedData = btoa(encodeURIComponent(JSON.stringify(exportData)));
        setBackupCode(encodedData);
      };

      const handleImportData = () => {
        try {
          const decodedData = JSON.parse(decodeURIComponent(atob(importCode.trim())));
          
          if (decodedData.settings && decodedData.records) {
            setSettings(decodedData.settings);
            saveData('menstrual_settings', decodedData.settings);
            
            setRecords(decodedData.records);
            saveData('menstrual_records', decodedData.records);
            
            setImportCode('');
            alert('🎉 資料還原成功！您的紀錄已同步到此裝置。');
          } else {
            alert('❌ 備份碼格式錯誤，請檢查是否複製完整。');
          }
        } catch (error) {
          alert('❌ 無效的備份碼，請檢查是否複製完整。');
        }
      };

      // --- AI 助理邏輯 ---
      const [chatHistory, setChatHistory] = useState([
        { role: 'model', parts: [{ text: '嗨！我是您的專屬 AI 健康小助手 🌸 關於月經週期、經期不適或是日常保養，有什麼我可以幫忙解答的嗎？' }] }
      ]);
      const [chatInput, setChatInput] = useState('');
      const [isChatting, setIsChatting] = useState(false);
      const [insight, setInsight] = useState('');
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const chatEndRef = useRef(null);

      const scrollToBottom = () => chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
      useEffect(() => { if (activeTab === 'ai') scrollToBottom(); }, [chatHistory, activeTab]);

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || isChatting) return;

        const userMessage = chatInput.trim();
        setChatInput('');
        const newHistory = [...chatHistory, { role: 'user', parts: [{ text: userMessage }] }];
        setChatHistory(newHistory);
        setIsChatting(true);

        try {
          // 🛑 請在此處填入您的 Gemini API Key
          const apiKey = "AIzaSyBqSu9EVt4zQjOMDwrwgK5ixauOb20vd0A"; 
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

          const payload = {
            contents: newHistory,
            systemInstruction: {
              parts: [{ text: "你是一位專業、溫暖且充滿同理心的女性健康與月經週期諮詢助理。請用繁體中文回答，語氣要像是個貼心的閨蜜或專業的護理師，提供客觀、科學但易懂的健康建議。回答盡量簡潔有力，並使用一點Emoji。請注意，你不能取代專業醫師的診斷，若有醫療需求需提醒就醫。" }]
            }
          };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.candidates && result.candidates.length > 0) {
            setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: result.candidates[0].content.parts[0].text }] }]);
          } else {
            setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: "系統有點忙碌，請稍後再試喔！" }] }]);
          }
        } catch (error) {
          setChatHistory(prev => [...prev, { role: 'model', parts: [{ text: "網路連線似乎有點問題，請檢查連線後再試一次。" }] }]);
        } finally {
          setIsChatting(false);
        }
      };

      const handleGenerateInsight = async () => {
        setIsAnalyzing(true);
        setInsight('');
        try {
          // 🛑 請在此處填入您的 Gemini API Key
          const apiKey = "AIzaSyBqSu9EVt4zQjOMDwrwgK5ixauOb20vd0A";
          const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

          const recordsText = records.length > 0
            ? records.map(r => `${r.startDate} 到 ${r.endDate}`).join('; ')
            : "目前無歷史紀錄";

          const prompt = `根據以下使用者的月經週期資料，給予大約100字到150字的簡短關懷與健康建議。
          - 設定週期長度: ${settings.cycleLength} 天
          - 設定行經期: ${settings.periodLength} 天
          - 歷史紀錄: ${recordsText}`;

          const payload = {
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            systemInstruction: {
              parts: [{ text: "你是一位專業、溫柔的女性健康顧問。請根據提供的週期數據，提供客觀、科學的簡短評估與週期保養建議。語氣溫暖，並鼓勵使用者。" }]
            }
          };

          const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (result.candidates && result.candidates.length > 0) {
            setInsight(result.candidates[0].content.parts[0].text);
          } else {
            setInsight("無法產生分析，請稍後再試。");
          }
        } catch (error) {
           setInsight("無法連線至 AI 服務，請確認網路狀態。");
        } finally {
          setIsAnalyzing(false);
        }
      };

      // --- 畫面渲染 ---
      const renderCalendar = () => (
        <div className="bg-white rounded-2xl shadow-sm p-4 animate-fade-in mb-20">
          <div className="flex justify-between items-center mb-6 relative">
            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() - 1, 1))} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition w-10 h-10 flex items-center justify-center">&lt;</button>
            <div className="text-center flex flex-col items-center">
              <h2 className="text-xl font-bold text-gray-800">{currentMonth.getFullYear()} 年 {currentMonth.getMonth() + 1} 月</h2>
              <button onClick={handleBackToToday} className="text-[11px] font-medium text-rose-400 hover:text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1 rounded-full mt-1.5 transition-colors">回到今天</button>
            </div>
            <button onClick={() => setCurrentMonth(new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 1))} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition w-10 h-10 flex items-center justify-center">&gt;</button>
          </div>

          <div className="grid grid-cols-7 gap-1 mb-2">
            {['日', '一', '二', '三', '四', '五', '六'].map(day => <div key={day} className="text-center text-xs font-medium text-gray-400 py-1">{day}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-1">
            {calendarDays.map((cell, idx) => (
              <div key={idx} className="aspect-square flex items-center justify-center p-1">
                {cell && (
                  <div className={`w-full h-full flex items-center justify-center rounded-full text-sm font-medium transition-all cursor-default
                      ${cell.type === 'actual_period' ? 'bg-rose-500 text-white shadow-md shadow-rose-200' : ''}
                      ${cell.type === 'predicted_period' ? 'bg-rose-200 text-rose-700' : ''}
                      ${cell.type === 'ovulation' ? 'bg-purple-500 text-white shadow-md shadow-purple-200' : ''}
                      ${cell.type === 'fertile' ? 'bg-purple-100 text-purple-700' : ''}
                      ${cell.type === 'safe' ? 'text-gray-600 hover:bg-gray-50' : ''}
                    `}>
                    {cell.day}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div className="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 text-xs border-t pt-4">
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-rose-500"></div><span className="text-gray-600">實際月經</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-rose-200"></div><span className="text-gray-600">預測月經</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-purple-500"></div><span className="text-gray-600">排卵日</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-purple-100"></div><span className="text-gray-600">易孕期</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-transparent border border-gray-200"></div><span className="text-gray-600">安全期</span></div>
          </div>
        </div>
      );

      const renderHistory = () => (
        <div className="bg-white rounded-2xl shadow-sm p-4 animate-fade-in mb-20">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-xl font-bold text-gray-800">歷年紀錄</h2>
            <button onClick={() => setShowAddForm(!showAddForm)} className="text-sm bg-rose-50 text-rose-600 px-3 py-1.5 rounded-full hover:bg-rose-100 transition">{showAddForm ? '取消' : '➕ 新增紀錄'}</button>
          </div>
          {showAddForm && (
            <form onSubmit={handleAddRecord} className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
              <div className="grid grid-cols-2 gap-4 mb-4">
                <div><label className="block text-xs text-gray-500 mb-1">開始日期</label><input type="date" required value={newRecord.startDate} onChange={e => setNewRecord({...newRecord, startDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
                <div><label className="block text-xs text-gray-500 mb-1">結束日期</label><input type="date" required value={newRecord.endDate} onChange={e => setNewRecord({...newRecord, endDate: e.target.value})} className="w-full text-sm border-gray-200 rounded-lg p-2 outline-none border bg-white"/></div>
              </div>
              <button type="submit" className="w-full bg-rose-500 text-white rounded-lg py-2 text-sm font-medium hover:bg-rose-600 transition">儲存紀錄</button>
            </form>
          )}
          <div className="space-y-3">
            {records.length === 0 ? (
              <div className="text-center text-gray-400 py-8 text-sm">目前還沒有紀錄，點擊上方按鈕新增。</div>
            ) :
